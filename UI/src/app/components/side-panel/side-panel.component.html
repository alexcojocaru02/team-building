<div
  class="sidenav tw:fixed tw:inset-y-0 tw:left-0 tw:flex tw:flex-col tw:bg-[var(--tc-surface-dark)] tw:text-white tw:transition-all tw:duration-150"
  [style.width]="collapsed ? 'var(--sidenav-collapsed)' : 'var(--sidenav-expanded)'">

  <div class="tw:flex tw:items-center tw:justify-center tw:px-3 tw:pt-4 tw:pb-2 tw:overflow-hidden">
    @if (collapsed) {
      <img src="assets/logos/teamconnect-rotund-64-transparent.svg" alt="TeamConnect" class="tw:h-9 tw:w-9" />
    } @else {
      <img src="assets/logos/teamconnect-wordmark-compact-dark.svg" alt="TeamConnect" class="tw:h-10" />
    }
  </div>

  <button
    mat-icon-button
    type="button"
    class="tw:self-end tw:m-3 tw:text-white"
    (click)="toggle()"
    aria-label="Toggle sidenav">
    <mat-icon class="tw:text-lg" aria-hidden="true">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
  </button>

  <nav class="tw:flex tw:flex-col tw:px-2 tw:gap-1" role="navigation" aria-label="Main">
    @for (it of navItems(); track it.label) {
      <a [routerLink]="it.route"
         routerLinkActive="tw:bg-white/10"
         class="tw:flex tw:items-center tw:gap-3 tw:px-3 tw:py-2 tw:rounded-md tw:no-underline">
        <span class="tw:w-9 !tw:h-9 tw:text-center">
          <mat-icon aria-hidden="true">{{ it.icon }}</mat-icon>
        </span>
        @if (!collapsed) {
          <span class="tw:whitespace-nowrap">{{ it.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="tw:flex-1"></div>

  <a [routerLink]="'/profile'" class="tw:flex tw:items-center tw:gap-3 tw:px-4 tw:py-2 tw:rounded-md tw:no-underline tw:mb-4">
    <span class="tw:w-9 tw:text-center"><mat-icon aria-hidden="true">person</mat-icon></span>
    @if (!collapsed) {
      <span class="tw:whitespace-nowrap">Profile</span>
    }
  </a>

</div>
